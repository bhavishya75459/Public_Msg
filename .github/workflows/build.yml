name: Build Kivy APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            ccache \
            git \
            python3-dev \
            python3-pip \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libgdbm-dev \
            libdb5.3-dev \
            libexpat1-dev \
            liblzma-dev \
            zlib1g-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            ffmpeg \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            unzip \
            zip \
            openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user buildozer cython==0.29.33
          # Add local bin to PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        run: |
          # SDK and NDK auto-setup support
          export PATH=$PATH:$HOME/.local/bin
          # Accepting licenses and starting build
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_TEST_DOMAIN: 1
          # Yeh force karta hai buildozer ko system compilers use karne ke liye
          CC: gcc
          CXX: g++

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kivy-app-debug
          path: bin/*.apk
          
