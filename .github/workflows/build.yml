name: Build Kivy APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential ccache git python3-dev python3-pip \
            libffi-dev libssl-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev \
            libgdbm-dev libdb5.3-dev libexpat1-dev liblzma-dev \
            zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev ffmpeg autoconf automake \
            libtool pkg-config cmake unzip zip openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Accept Android SDK Licenses
        run: |
          # SDK manager se saare licenses auto-accept karna
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK with Buildozer
        run: |
          # Buildozer auto-accept logic ke saath
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_TEST_DOMAIN: 1

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdMob-App-Debug
          path: bin/*.apk
          
