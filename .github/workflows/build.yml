name: Build Kivy APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential ccache git python3-dev python3-pip \
            libffi-dev libssl-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev \
            libgdbm-dev libdb5.3-dev libexpat1-dev liblzma-dev \
            zlib1g-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev ffmpeg autoconf automake \
            libtool pkg-config cmake unzip zip openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Force Accept Android Licenses
        run: |
          # SDK Manager se saare licenses manually accept karna
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | sdkmanager --licenses || true

      - name: Build APK with Buildozer
        run: |
          # APP_ACCEPT_SDK_LICENSE force karta hai auto-accept ke liye
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_ORG_TEST_DOMAIN: 1
          APP_ACCEPT_SDK_LICENSE: "1"
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdMob-App-Debug
          path: bin/*.apk
          
