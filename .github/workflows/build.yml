name: Build Kivy APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Android SDK Commandline & Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip openjdk-11-jdk wget
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          sudo mkdir -p /usr/local/android-sdk/cmdline-tools
          sudo unzip -o cmdline-tools.zip -d /usr/local/android-sdk/cmdline-tools/
          sudo mv /usr/local/android-sdk/cmdline-tools/cmdline-tools /usr/local/android-sdk/cmdline-tools/latest
          sudo chown -R $USER /usr/local/android-sdk
          export ANDROID_SDK_ROOT=/usr/local/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          echo "ANDROID_SDK_ROOT=/usr/local/android-sdk" >> $GITHUB_ENV
          echo "/usr/local/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Build APK with Buildozer
        uses: digreatbrian/buildozer-action@v2
        env:
          ANDROID_SDK_ROOT: /usr/local/android-sdk
        with:
          buildozer-cmd: buildozer -v android debug
          work-dir: .
